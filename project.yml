name: AARU
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: 17.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.tianzhichen.aaru
    SWIFT_VERSION: 5.10
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.23.1
targets:
  AARU:
    type: application
    platform: iOS
    sources:
      - path: AARU
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "AARU uses your microphone to capture your voice so it can shape your Ka."
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: Supabase
        product: Supabase
    scheme:
      testTargets:
        - AARUTests
  AARUTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AARUTests
    dependencies:
      - target: AARU
