name: Magpie
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: 17.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.trythumos.app
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 2.1
targets:
  Magpie:
    type: application
    platform: iOS
    sources:
      - path: Magpie
    info:
      path: Magpie/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIAppFonts:
          - CormorantGaramond-Light.ttf
          - CormorantGaramond-Regular.ttf
          - CormorantGaramond-Medium.ttf
          - CormorantGaramond-LightItalic.ttf
          - SpaceGrotesk-Light.ttf
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - InstrumentSerif-Regular.ttf
          - InstrumentSerif-Italic.ttf
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: "Magpie uses your location to find soulmates near you."
        NSCameraUsageDescription: "Magpie uses your camera so you can add photos to your match profile."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Magpie/Magpie.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - MagpieTests
  MagpieTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MagpieTests
      - path: contracts
        buildPhase: resources
        type: folder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Magpie
