<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot 1 — Conversation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: #0a0806; }

  body {
    width: 1284px;
    height: 2778px;
    background: linear-gradient(180deg, #0a0806 0%, #100e08 40%, #0a0806 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .marketing {
    padding: 140px 80px 0;
    text-align: center;
    flex-shrink: 0;
  }

  .marketing h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    font-weight: 300;
    color: rgba(255,248,230,0.92);
    letter-spacing: -1px;
    line-height: 1.15;
    margin-bottom: 20px;
  }

  .marketing h1 em {
    font-style: italic;
    color: rgba(212,176,77,0.85);
  }

  .marketing p {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 300;
    color: rgba(255,248,230,0.38);
  }

  .device {
    margin-top: 64px;
    width: 948px;
    border-radius: 48px;
    border: 5px solid rgba(255,255,255,0.10);
    overflow: hidden;
    flex-shrink: 0;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 30px 100px rgba(0,0,0,0.6);
  }

  .device img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<div class="marketing">
  <h1>A mirror that <em>listens</em></h1>
  <p>Conversations that go deeper than surface</p>
</div>

<div class="device">
  <img src="raw-conversation.png" alt="Conversation screen">
</div>

</body>
</html>
