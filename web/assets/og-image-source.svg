<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Thumos social preview image</title>
  <desc id="desc">Near-white background with Thumos wordmark and soul mirror tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdfcf8" />
      <stop offset="100%" stop-color="#fafafa" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#ecd79b" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ecd79b" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#halo)" />
  <rect x="72" y="72" width="1056" height="486" rx="42" fill="rgba(255,255,255,0.75)" stroke="#e0e0e0" />
  <text x="600" y="248" fill="#1a1a1a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="84" font-weight="700" letter-spacing="28" text-anchor="middle">THUMOS</text>
  <text x="600" y="326" fill="#1a1a1a" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-style="italic" text-anchor="middle">The spirit within.</text>
  <text x="600" y="392" fill="#6b6b6b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="30" text-anchor="middle">An AI soul mirror for honest, reflective conversation.</text>
  <line x1="445" y1="450" x2="755" y2="450" stroke="#d4b04d" stroke-width="4" stroke-linecap="round" />
  <text x="600" y="498" fill="#bfa043" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="700" letter-spacing="6" text-anchor="middle">NO QUIZZES. NO LABELS. JUST A MIRROR.</text>
</svg>
